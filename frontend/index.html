<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Frontend</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker API Demo</h1>
            <p>Send data from this form to the FastAPI backend. Pydantic will validate the JSON!</p>
        </header>

        <main>
            <!-- Transaction Form -->
            <section class="card form-section">
                <h2>Add New Transaction</h2>
                <form id="transaction-form">
                    
                    <h3>Transaction Details</h3>
                    <div class="form-group">
                        <label for="transaction_id">Transaction ID (must start with TXN)</label>
                        <input type="text" id="transaction_id" value="TXN001" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount (must be > 0)</label>
                        <input type="number" id="amount" value="50.0" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="transaction_type">Type</label>
                        <select id="transaction_type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                            <option value="invalid_type">Invalid Type (To Test Validation)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" value="Coffee" required>
                    </div>

                    <hr>
                    <h3>Category Details</h3>
                    <div class="form-group">
                        <label for="category_name">Category Name</label>
                        <input type="text" id="category_name" value="Food">
                    </div>

                    <hr>
                    <h3>Account Details</h3>
                    <div class="form-group">
                        <label for="currency">Currency (INR, USD, EUR)</label>
                        <input type="text" id="currency" value="USD">
                    </div>

                    <div class="form-group">
                        <label for="balance">Account Balance</label>
                        <input type="number" id="balance" value="5000" step="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">User Email</label>
                        <input type="text" id="email" value="alice@example.com">
                    </div>

                    <button type="submit" id="submit-btn">Send JSON to Backend</button>
                </form>
            </section>

            <!-- Results Section -->
            <section class="card results-section">
                <h2>Backend Response</h2>
                
                <div id="response-box" class="response-box empty">
                    <p>Submit the form to see the backend response here.</p>
                </div>
                
                <h3>Saved Transactions</h3>
                <button id="refresh-btn">Refresh List</button>
                <div id="transaction-list"></div>
            </section>
        </main>
    </div>

    <script>
        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Construct the nested JSON object mimicking our Pydantic Schema!
            const payload = {
                transaction_id: document.getElementById('transaction_id').value,
                amount: parseFloat(document.getElementById('amount').value),
                transaction_type: document.getElementById('transaction_type').value,
                description: document.getElementById('description').value,
                timestamp: new Date().toISOString(),
                // Nested Category
                category: {
                    category_id: 1,
                    name: document.getElementById('category_name').value,
                    description: "User submitted category"
                },
                // Nested Account
                account: {
                    account_id: "ACC999",
                    account_type: "Wallet",
                    balance: parseFloat(document.getElementById('balance').value),
                    currency: document.getElementById('currency').value,
                    // Deeply nested User
                    user: {
                        user_id: "U999",
                        full_name: "Web User",
                        email: document.getElementById('email').value,
                        created_at: new Date().toISOString(),
                        is_active: true
                    }
                }
            };

            const responseBox = document.getElementById('response-box');
            responseBox.className = 'response-box loading';
            responseBox.innerHTML = '<p>Sending to backend...</p><pre>' + JSON.stringify(payload, null, 2) + '</pre>';

            try {
                // 2. Send the JSON to the FastAPI backend
                const response = await fetch('/api/transactions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // 3. Handle the response
                if (response.ok) {
                    // Success! HTTP 201
                    responseBox.className = 'response-box success';
                    responseBox.innerHTML = `<h3>✅ Success!</h3><p>${data.message}</p>`;
                    fetchTransactions(); // Update the list below
                } else if (response.status === 422) {
                    // Pydantic Validation Failed! HTTP 422
                    responseBox.className = 'response-box error';
                    let errorHtml = `<h3>❌ Pydantic Validation Failed!</h3>`;
                    errorHtml += `<ul>`;
                    data.errors.forEach(err => {
                        errorHtml += `<li>${err}</li>`;
                    });
                    errorHtml += `</ul>`;
                    responseBox.innerHTML = errorHtml;
                } else {
                    responseBox.className = 'response-box error';
                    responseBox.innerHTML = `<h3>⚠️ Unknown Error</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                responseBox.className = 'response-box error';
                responseBox.innerHTML = `<h3>⚠️ Network Error</h3><p>${error.message}</p>`;
            }
        });

        // Fetch saved transactions
        async function fetchTransactions() {
            try {
                const response = await fetch('/api/transactions');
                const txns = await response.json();
                
                const listDiv = document.getElementById('transaction-list');
                if (txns.length === 0) {
                    listDiv.innerHTML = "<p>No transactions saved yet.</p>";
                    return;
                }
                
                let html = '<ul>';
                txns.forEach(txn => {
                    html += `<li><strong>${txn.transaction_id}</strong> - $${txn.amount} (${txn.description}) <br><small>Category: ${txn.category.name} | Acc: ${txn.account.currency}</small></li>`;
                });
                html += '</ul>';
                listDiv.innerHTML = html;
                
            } catch(e) {
                console.error("Failed to fetch transactions");
            }
        }

        document.getElementById('refresh-btn').addEventListener('click', fetchTransactions);
        fetchTransactions(); // Load on page load
    </script>
</body>
</html>
